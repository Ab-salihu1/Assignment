<!DOCTYPE html>
<html>
<head>
 <style>
 h1 {background-color:blue;
  color:gold;
  padding:10px
  }
 body {background-color:#fffff0}
 button{background-color:gold;
  color:white;
  border-radius:5px;
 padding:6px;}
 button:hover { background-color:royalblue;}
 pre{color:blue}
 
 
 </style>
 
</head>
<body>
 <!--Form structure-->
 <form action="#" method="POST">
<h1>Student Registration 
 Form</h1>
 <pre>
  <!--Text Input Label-->
  <label for="first name">First Name:</label>
  <input type="text" id="first name" placeholder="First Name...">
  <label for="last name">Last Name:</label>
  <input type="text" id="last name" placeholder="Last Name...">
 </pre>
<pre>
 <!--number input-->
  <label for="age">Age:</label>
  <input type="number" id="age" min="10" max="99">
 </pre>
 <pre>
  <!--Email input-->
  <label for="email">Email:</label>
  <input type="email" id="email" placeholder="abc1@gmail.com...">
  </pre>
 <pre>
  <!--Telephone Input-->
  <label for="telephonenumber">Telephone No:</label>
  <input type="tel" id="telephonenumber" placeholder="+23456789...">
  </pre>
 <pre>
  <!--Password input-->
  <label for="password">Password:</label>
  <input type="password" id="password" minlength="8" placeholder="@Abc123...">
<br><label for="confirmpassword">Confirm Password:</label>
  <input type="confirmpassword" id="confirmpassword" minlength="8" placeholder="@Abc123...">
  </pre>
 <pre>
  <!--Radio Button Gender-->
  <label for="radio">Gender:</label><br>
  <label for="male">Male</label><input type="radio" id="male"
   <label for="female">Female</label><input type="radio" id="female"
   <label for="prfer not to say">Prefer not to say</label><input type="radio" id="prefer not to say">
  </pre>
 <pre>
  <!--checkboxes courses-->
  <label for="checkbox">Courses:</label>
  <label for="software development">Software Development</label>
  <input type="checkbox" id="software development">
  <label for="ui/ux design">UI/UX Design</label>
  <input type="checkbox" id="ui/ux design">
  <label for="data analytic">Data Analytic</label>
  <input type="checkbox" id="data analytic">
  <label for="web design">Web Design</label>
  <input type="checkbox" id="web design">
  <label for="product management">Product Management</label>
  <input type="checkbox" id="product management">
  </pre>
 <pre>
  <!--Submit And Reset Buttons-->
  <button>Register Now</button><button>Clear Form</button>
  </pre>
  
  
  
  
  
  
  
 </form>
</body>
</html>
